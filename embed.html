<div style="width:auto; font-family: Georgia, 'Times New Roman', serif;">

    <style>
      /* ─── Base reset ─────────────────────────────────────────── */
      html, body { margin: 0; padding: 0; }

      h1 {
        font-size: 46px;
      }

      #last-updated {
        font-size: 12px;
      }
  
      /* ─── Colour tokens ──────────────────────────────────────── */
      :root {
        --cream: hsl(48, 30%, 92%);
        --cream-mid: hsl(48, 25%, 86%);
        --cream-dark: hsl(48, 20%, 75%);
        --highlight: hsl(55, 100%, 78%);
        --blue-sel: hsl(220, 50%, 50%);
        --red-accent: hsl(0, 50%, 50%);
        --shadow: hsla(30, 20%, 20%, 0.18);
        --text: hsl(30, 15%, 20%);
        --github-star-bg: hsl(210, 16%, 13%);
  
        --toolbar-control-height: 38px;
        --toolbar-control-radius: 6px;
        --toolbar-icon-button-size: 38px;
      }
  
      /* ─── Toolbar buttons (size / terrain) ───────────────────── */
      button {
        text-align: center;
        padding: 0;
        background: var(--cream);
        border: 1.5px solid var(--cream-dark);
        border-radius: 6px;
        cursor: pointer;
        box-shadow: 0 2px 4px var(--shadow), inset 0 1px 0 hsla(0,0%,100%,0.55);
        transition: background 0.12s, box-shadow 0.12s, transform 0.08s;
      }
  
      button:hover:not(:disabled) {
        background: var(--cream-mid);
        box-shadow: 0 3px 7px var(--shadow), inset 0 1px 0 hsla(0,0%,100%,0.55);
        transform: translateY(-1px);
      }
  
      button:active:not(:disabled) {
        transform: translateY(0);
        box-shadow: 0 1px 2px var(--shadow);
      }
  
      button svg { width: 100%; height: 100%; }
  
      button text {
        text-anchor: middle;
        font-size: 20px;
        font-family: Georgia, serif;
        fill: var(--text);
      }
  
      /* Active / selected state */
      button.current-control {
        background: var(--highlight);
        outline: 2px solid var(--blue-sel);
        outline-offset: 1px;
        box-shadow: 0 2px 8px hsla(220,50%,50%,0.25), inset 0 1px 0 hsla(0,0%,100%,0.55);
      }
  
      button:focus { outline: none; }
      button:disabled, input:disabled { cursor: not-allowed; opacity: 0.3; }
  
      /* ─── Sliders ─────────────────────────────────────────────── */
      input[type="range"] {
        cursor: ew-resize;
        margin: 0;
        accent-color: var(--red-accent);
        height: 4px;
      }
  
      /* ─── Grid layout (landscape) ────────────────────────────── */
      #ui {
        display: grid;
        min-height: calc(100vmin - 130px);
        grid-template-rows: repeat(3, 44px) calc(100vmin - 130px - 132px - 40px);
        grid-template-columns: 1fr calc(100vmin - 130px) repeat(4, 34px) 1fr;
        grid-row-gap: 10px;
        grid-column-gap: 10px;
        padding: 12px 14px 4px;
        box-sizing: border-box;
        background: hsl(48, 25%, 96%);
      }
  
      #map      { grid-area: 1 / 2 / span 4 / span 1; width: 100%; height: 100%; }
      #tiny     { grid-area: 1 / 3 / span 1 / span 1; }
      #small    { grid-area: 1 / 4 / span 1 / span 1; }
      #medium   { grid-area: 1 / 5 / span 1 / span 1; }
      #large    { grid-area: 1 / 6 / span 1 / span 1; }
      #ocean    { grid-area: 2 / 3 / span 1 / span 2; }
      #shallow  { grid-area: 2 / 5 / span 1 / span 2; }
      #valley   { grid-area: 3 / 3 / span 1 / span 2; }
      #mountain { grid-area: 3 / 5 / span 1 / span 2; }
      #sliders  { grid-area: 4 / 3 / span 1 / span 4; overflow-y: scroll; overflow-x: clip; line-height: 1.2; }
  
      /* ─── Portrait layout ────────────────────────────────────── */
      @media (orientation: portrait) {
        #ui {
          grid-template-rows: calc(100vmin) repeat(4, 44px) 1fr;
          grid-template-columns: 74px 74px calc(100vmin - 50px - 148px - 40px);
          padding: 8px 10px 4px;
        }
  
        #map      { grid-area: 1 / 1 / span 1 / span 6; }
        #tiny     { grid-area: 2 / 1 / span 1 / span 1; }
        #small    { grid-area: 3 / 1 / span 1 / span 1; }
        #medium   { grid-area: 4 / 1 / span 1 / span 1; }
        #large    { grid-area: 5 / 1 / span 1 / span 1; }
        #ocean    { grid-area: 2 / 2 / span 1 / span 1; }
        #shallow  { grid-area: 3 / 2 / span 1 / span 1; }
        #valley   { grid-area: 4 / 2 / span 1 / span 1; }
        #mountain { grid-area: 5 / 2 / span 1 / span 1; }
        #sliders  { grid-area: 2 / 3 / span 5 / span 1; justify-self: end; width: 100%; column-width: 20ch; }
      }
  
      /* ─── Canvas ─────────────────────────────────────────────── */
      #map {
        position: relative;
      }
  
      #mapgen4 {
        width: 100%;
        height: 100%;
        cursor: crosshair;
        border-radius: 4px;
        box-shadow: 0 3px 12px var(--shadow);
      }
  
      #icon-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
  
      #icon-layer.icon-mode-active {
        pointer-events: auto;
        cursor: copy;
      }
  
      .map-icon {
        position: absolute;
        width: 28px;
        height: 28px;
        transform: translate(-50%, -50%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: hsl(10, 35%, 25%);
        filter: drop-shadow(0 1px 2px rgba(0,0,0,0.35));
        user-select: none;
      }
  
      .map-icon svg {
        width: 100%;
        height: 100%;
        display: block;
      }
  
      .map-icon.selected {
        outline: 2px solid var(--blue-sel);
        outline-offset: 2px;
        border-radius: 4px;
      }
  
      /* ─── Sliders panel ──────────────────────────────────────── */
      #sliders {
        background: var(--cream);
        border: 1.5px solid var(--cream-dark);
        border-radius: 6px;
        padding: 6px 10px 10px;
        box-sizing: border-box;
        overflow-x: hidden;
        box-shadow: inset 0 1px 3px hsla(30,10%,10%,0.07);
        scrollbar-width: thin;
        scrollbar-color: var(--cream-dark) transparent;
      }
  
      #sliders h3 {
        background: linear-gradient(to right, var(--cream-mid), transparent);
        border-left: 3px solid var(--cream-dark);
        margin: 8px 0 4px;
        padding: 4px 8px;
        font-family: Georgia, serif;
        font-size: 68%;
        font-weight: bold;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--text);
        border-radius: 0 3px 3px 0;
      }
  
      #sliders label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 66%;
        color: var(--text);
        margin-bottom: 10px;
      }
  
      #sliders label span {
        font-family: 'Courier New', Courier, monospace;
        color: hsl(30, 15%, 35%);
      }
  
      #sliders label input[type="range"] {
        width: 100%;
        box-sizing: border-box;
      }
  
      /* ─── Reset button ───────────────────────────────────────── */
      #button-reset {
        display: block;
        width: 100%;
        height: 2.2em;
        margin: 4px 0 8px;
        font-family: Georgia, serif;
        font-size: 72%;
        letter-spacing: 0.05em;
        color: var(--text);
        border-radius: 5px;
      }
  
      /* ─── Toolbars ───────────────────────────────────────────── */
      .icon-toolbar,
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        padding: 10px 14px 12px;
        background: var(--cream-mid);
      }
  
      .icon-toolbar {
        border-top: 1.5px solid var(--cream-dark);
        border-bottom: 1.5px solid var(--cream-dark);
      }
  
      .toolbar {
        border-top: none;
      }
  
      .toolbar-spacer {
        margin-left: auto;
      }
  
      .icon-toolbar button,
      .toolbar button,
      .github-link,
      #icon-color-picker {
        height: var(--toolbar-control-height);
        box-sizing: border-box;
        border-radius: var(--toolbar-control-radius);
      }
  
      .icon-toolbar button,
      .toolbar button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        font-family: Georgia, serif;
        font-size: 72%;
        letter-spacing: 0.04em;
        color: var(--text);
        line-height: 1;
        vertical-align: middle;
      }
  
      .toolbar-label {
        display: inline-flex;
        align-items: center;
        height: var(--toolbar-control-height);
        font-size: 72%;
        color: var(--text);
        font-family: Georgia, serif;
        line-height: 1;
      }
  
      #icon-color-picker {
        width: 48px;
        min-width: 48px;
        padding: 2px;
        border: 1.5px solid var(--cream-dark);
        background: var(--cream);
        cursor: pointer;
        vertical-align: middle;
      }
  
      #icon-town,
      #icon-castle,
      #icon-city,
      #icon-tree {
        width: var(--toolbar-icon-button-size);
        min-width: var(--toolbar-icon-button-size);
        height: var(--toolbar-icon-button-size);
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #6b3f2a;
        line-height: 1;
      }
  
      #icon-town svg,
      #icon-castle svg,
      #icon-city svg,
      #icon-tree svg {
        width: 22px;
        height: 22px;
        display: block;
      }
  
      #button-delete-mode.current-control {
        background: hsl(8, 85%, 82%);
        outline: 2px solid hsl(0, 60%, 45%);
        outline-offset: 1px;
      }
  
      /* ─── GitHub links ───────────────────────────────────────── */
      .github-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        font-family: Georgia, serif;
        font-size: 72%;
        letter-spacing: 0.04em;
        color: white;
        text-decoration: none;
        background: var(--cream);
        border: 1.5px solid var(--cream-dark);
        box-shadow: 0 2px 4px var(--shadow), inset 0 1px 0 hsla(0,0%,100%,0.55);
        transition: background 0.12s, box-shadow 0.12s, transform 0.08s;
        line-height: 1;
        background-color: var(--github-star-bg);
        vertical-align: middle;
      }
  
      .github-link:hover {
        background: var(--github-star-bg);
        box-shadow: 0 3px 7px var(--shadow), inset 0 1px 0 hsla(0,0%,100%,0.55);
        transform: translateY(-1px);
      }
  
      .github-link:active {
        transform: translateY(0);
        box-shadow: 0 1px 2px var(--shadow);
      }
    </style>
  
    <div id="ui">
        <div>
            <h1>Michael's Mapgen4 Fork</h1>
            <p id="last-updated">Last updated: 2026</p>
        </div>
      
  
      <button id="tiny"><svg viewBox="-50 -50 100 100"><circle r="7"/></svg></button>
      <button id="small"><svg viewBox="-50 -50 100 100"><circle r="20"/></svg></button>
      <button id="medium"><svg viewBox="-50 -50 100 100"><circle r="35"/></svg></button>
      <button id="large"><svg viewBox="-50 -50 100 100"><circle r="50"/></svg></button>
  
      <button id="ocean" title="Ocean">
        <svg viewBox="-50 -50 100 100">
          <text y="45">Ocean</text>
          <path d="M -50,-30 q 25,-20 50,0 q 25,20 50,0 l 0,50 l -100,0 z" fill="hsl(240,50%,40%)"/>
        </svg>
      </button>
  
      <button id="shallow" title="Water">
        <svg viewBox="-50 -50 100 100">
          <text y="45">Water</text>
          <path d="M -50,-20 q 15,20 30,0 q 20,20 40,0 q 15,20 30,0 l 0,40 l -100,0 z" fill="hsl(200,50%,70%)"/>
        </svg>
      </button>
  
      <button id="valley" title="Valley">
        <svg viewBox="-50 -50 100 100">
          <text y="45">Valley</text>
          <path d="M -50,-20 c 20,10 80,10 100,0 l 0,40 l -100,0 z" fill="hsl(100,40%,60%)"/>
        </svg>
      </button>
  
      <button id="mountain" title="Mountain">
        <svg viewBox="-50 -50 100 100">
          <text y="45">Mountains</text>
          <g fill="hsl(60,50%,40%)" stroke="white" stroke-width="2">
            <path d="M -30,20 l 30,-60 l 30,60 z"/>
            <path d="M -50,20 l 20,-40 l 20,40 z"/>
            <path d="M 10,20 l 15,-30 l 15,30 z"/>
          </g>
        </svg>
      </button>
  
      <div id="sliders">
        <button id="button-reset">Reset Terrain</button>
      </div>
  
      <div id="map">
        <canvas id="mapgen4" width="2048" height="2048"></canvas>
        <div id="icon-layer" aria-label="Map icons layer"></div>
      </div>
    </div>
  
    <div class="icon-toolbar">
      <button id="button-icon-mode">Place Icons: Off</button>
      <button id="button-delete-mode">Delete Icons: Off</button>
      <button id="button-clear-icons">Clear All Icons</button>
  

      <input
        id="icon-color-picker"
        type="color"
        value="#6b3f2a"
        title="Choose icon color"
      >
  
      <button id="icon-town" title="Town">
        <svg viewBox="0 0 64 64" width="20" height="20" aria-hidden="true">
          <rect x="12" y="26" width="40" height="24" rx="2" fill="currentColor"></rect>
          <polygon points="32,10 8,28 56,28" fill="currentColor"></polygon>
          <rect x="28" y="36" width="8" height="14" fill="white"></rect>

      <button id="icon-castle" title="Castle">

            <rect x="24.631" y="24.323" width="11.019" height="11.019" fill="currentColor"/>
            <rect x="45.049" y="33.722" width="11.181" height="22.038" fill="currentColor"/>

          </svg>
      </button>
  
      <button id="icon-tree" title="Tree">
        <svg viewBox="0 0 64 64" width="20" height="20" aria-hidden="true">
          <polygon points="32,10 16,32 48,32" fill="currentColor"></polygon>
          <polygon points="32,20 14,42 50,42" fill="currentColor"></polygon>
          <rect x="28" y="42" width="8" height="12" fill="currentColor"></rect>
        </svg>
      </button>
  
      <button id="button-download-icons">Export icons</button>
      <button id="button-import-icons">Import icons</button>
      <input id="input-import-icons" type="file" accept="application/json,.json" style="display:none">
    </div>
  
    <div class="toolbar">
      <button id="button-download-config">Export config</button>
      <button id="button-import-config">Import config</button>
      <input id="input-import-config" type="file" accept="application/json,.json" style="display:none">
  
      <button id="button-download-paint">Export terrain</button>
      <button id="button-import-paint">Import terrain</button>
      <input id="input-import-paint" type="file" accept="application/json,.json" style="display:none">
  
      <button id="button-download">Save as PNG (no icons)</button>

      <button id="button-download-obj">Export 3D</button>

      

      <span class="toolbar-spacer"></span>
      <a class="github-link" href="https://github.com/MichaelCooks/mapgen4/wiki/Using-the-Toolbar" target="_blank" rel="noopener"><i>"What do all these buttons do?"</i></a>
      <a class="github-link" href="https://github.com/MichaelCooks/mapgen4" target="_blank" rel="noopener">Star on GitHub</a>
    </div>
  
    <script defer src="build/_bundle.js"></script>
    <script defer src="icon-layer.js"></script>

    <script>
        (function () {
          const USER = "MichaelCooks";
          const REPO = "mapgen4";
      
          fetch(`https://api.github.com/repos/${USER}/${REPO}/commits`)
            .then(response => response.json())
            .then(data => {
              if (!data || !data[0]) return;
      
              const isoDate = data[0].commit.committer.date;
              const formatted = new Date(isoDate).toLocaleString(undefined, {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
              });
      
              document.getElementById("last-updated").textContent =
                "Last updated: " + formatted;
            })
            .catch(err => {
              console.error("Failed to fetch last updated time:", err);
              document.getElementById("last-updated").textContent =
                "Last updated: unavailable";
            });
        })();
      </script>

  </div>
