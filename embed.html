<div style="width:auto; font-family: Georgia, 'Times New Roman', serif;">

    <style>
      /* ─── Base reset ─────────────────────────────────────────── */
      html, body { margin: 0; padding: 0; }
    
      /* ─── Colour tokens ──────────────────────────────────────── */
      :root {
        --cream:        hsl(48, 30%, 92%);
        --cream-mid:    hsl(48, 25%, 86%);
        --cream-dark:   hsl(48, 20%, 75%);
        --highlight:    hsl(55, 100%, 78%);
        --blue-sel:     hsl(220, 50%, 50%);
        --red-accent:   hsl(0,  50%, 50%);
        --shadow:       hsla(30, 20%, 20%, 0.18);
        --text:         hsl(30, 15%, 20%);
        --github-star-bg: hsl(210, 16%, 13%);
      }
    
      /* ─── Toolbar buttons (size / terrain) ───────────────────── */

      button {
        text-align: center;
        padding: 0;
        background: var(--cream);
        border: 1.5px solid var(--cream-dark);
        border-radius: 6px;
        cursor: pointer;
        box-shadow: 0 2px 4px var(--shadow), inset 0 1px 0 hsla(0,0%,100%,0.55);
        transition: background 0.12s, box-shadow 0.12s, transform 0.08s;
      }
      button:hover:not(:disabled) {
        background: var(--cream-mid);
        box-shadow: 0 3px 7px var(--shadow), inset 0 1px 0 hsla(0,0%,100%,0.55);
        transform: translateY(-1px);
      }
      button:active:not(:disabled) {
        transform: translateY(0);
        box-shadow: 0 1px 2px var(--shadow);
      }
      button svg { width: 100%; height: 100%; }
      button text {
        text-anchor: middle;
        font-size: 20px;
        font-family: Georgia, serif;
        fill: var(--text);
      }
    
      /* Active / selected state */
      button.current-control {
        background: var(--highlight);
        outline: 2px solid var(--blue-sel);
        outline-offset: 1px;
        box-shadow: 0 2px 8px hsla(220,50%,50%,0.25), inset 0 1px 0 hsla(0,0%,100%,0.55);
      }
      button:focus { outline: none; }
      button:disabled, input:disabled { cursor: not-allowed; opacity: 0.3; }
    
      /* ─── Sliders ─────────────────────────────────────────────── */
      input[type="range"] {
        cursor: ew-resize;
        margin: 0;
        accent-color: var(--red-accent);
        height: 4px;
      }
    
      /* ─── Grid layout (landscape) ────────────────────────────── */
      #ui {
        display: grid;
        min-height: calc(100vmin - 130px);
        grid-template-rows: repeat(3, 44px) calc(100vmin - 130px - 132px - 40px);
        grid-template-columns: 1fr calc(100vmin - 130px) repeat(4, 34px) 1fr;
        grid-row-gap: 10px;
        grid-column-gap: 10px;
        padding: 12px 14px 4px;
        box-sizing: border-box;
        background: hsl(48, 25%, 96%);
      }
    
      #map      { grid-area: 1 / 2 / span 4 / span 1; width:100%; height:100%; }
      #tiny     { grid-area: 1 / 3 / span 1 / span 1; }
      #small    { grid-area: 1 / 4 / span 1 / span 1; }
      #medium   { grid-area: 1 / 5 / span 1 / span 1; }
      #large    { grid-area: 1 / 6 / span 1 / span 1; }
      #ocean    { grid-area: 2 / 3 / span 1 / span 2; }
      #shallow  { grid-area: 2 / 5 / span 1 / span 2; }
      #valley   { grid-area: 3 / 3 / span 1 / span 2; }
      #mountain { grid-area: 3 / 5 / span 1 / span 2; }
      #sliders  { grid-area: 4 / 3 / span 1 / span 4; overflow-y: scroll; overflow-x: clip; line-height: 1.2; }
    
      /* ─── Portrait layout ────────────────────────────────────── */
      @media (orientation: portrait) {
        #ui {
          grid-template-rows: calc(100vmin) repeat(4, 44px) 1fr;
          grid-template-columns: 74px 74px calc(100vmin - 50px - 148px - 40px);
          padding: 8px 10px 4px;
        }
        #map      { grid-area: 1 / 1 / span 1 / span 6; }
        #tiny     { grid-area: 2 / 1 / span 1 / span 1; }
        #small    { grid-area: 3 / 1 / span 1 / span 1; }
        #medium   { grid-area: 4 / 1 / span 1 / span 1; }
        #large    { grid-area: 5 / 1 / span 1 / span 1; }
        #ocean    { grid-area: 2 / 2 / span 1 / span 1; }
        #shallow  { grid-area: 3 / 2 / span 1 / span 1; }
        #valley   { grid-area: 4 / 2 / span 1 / span 1; }
        #mountain { grid-area: 5 / 2 / span 1 / span 1; }
        #sliders  { grid-area: 2 / 3 / span 5 / span 1; justify-self: end; width: 100%; column-width: 20ch; }
      }
    
      /* ─── Canvas ─────────────────────────────────────────────── */
      #mapgen4 {
        width: 100%;
        height: 100%;
        cursor: crosshair;
        border-radius: 4px;
        box-shadow: 0 3px 12px var(--shadow);
      }
    
      /* ─── Sliders panel ──────────────────────────────────────── */
      #sliders {
        background: var(--cream);
        border: 1.5px solid var(--cream-dark);
        border-radius: 6px;
        padding: 6px 10px 10px;
        box-sizing: border-box;
        overflow-x: hidden;
        box-shadow: inset 0 1px 3px hsla(30,10%,10%,0.07);
        scrollbar-width: thin;
        scrollbar-color: var(--cream-dark) transparent;
      }
      #sliders h3 {
        background: linear-gradient(to right, var(--cream-mid), transparent);
        border-left: 3px solid var(--cream-dark);
        margin: 8px 0 4px;
        padding: 4px 8px;
        font-family: Georgia, serif;
        font-size: 68%;
        font-weight: bold;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--text);
        border-radius: 0 3px 3px 0;
      }
      #sliders label {
        display: flex;
        flex-direction: column;
        gap: 3px;
        font-size: 66%;
        color: var(--text);
        margin-bottom: 7px;
      }
      #sliders label span {
        font-family: 'Courier New', Courier, monospace;
        color: hsl(30, 15%, 35%);
      }
      #sliders label input[type="range"] {
        width: 100%;
        box-sizing: border-box;
      }
    
      /* ─── Reset button ───────────────────────────────────────── */
      #button-reset {
        display: block;
        width: 100%;
        height: 2.2em;
        margin: 4px 0 8px;
        font-family: Georgia, serif;
        font-size: 72%;
        letter-spacing: 0.05em;
        color: var(--text);
        border-radius: 5px;
      }
    
      /* ─── Bottom toolbar (export / import / save) ────────────── */
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        padding: 10px 14px 12px;
        background: var(--cream-mid);
        border-top: 1.5px solid var(--cream-dark);
      }
      .toolbar-spacer { margin-left: auto; }
      .toolbar button {
        padding: 5px 14px;
        font-family: Georgia, serif;
        font-size: 72%;
        letter-spacing: 0.04em;
        color: var(--text);
        height: auto;
        line-height: 1.4;
      }
    
      /* ─── GitHub star link ───────────────────────────────────── */
      #github-star {
        display: inline-block;
        padding: 5px 14px;
        font-family: Georgia, serif;
        font-size: 72%;
        letter-spacing: 0.04em;
        color: white;
        text-decoration: none;
        background: var(--cream);
        border: 1.5px solid var(--cream-dark);
        border-radius: 6px;
        box-shadow: 0 2px 4px var(--shadow), inset 0 1px 0 hsla(0,0%,100%,0.55);
        transition: background 0.12s, box-shadow 0.12s, transform 0.08s;
        line-height: 1.4;
        background-color: var(--github-star-bg);
      }
      #github-star:hover {
        background: var(--github-star-bg);
        box-shadow: 0 3px 7px var(--shadow), inset 0 1px 0 hsla(0,0%,100%,0.55);
        transform: translateY(-1px);
      }
      #github-star:active {
        transform: translateY(0);
        box-shadow: 0 1px 2px var(--shadow);
      }
    </style>
    
      <div id="ui">
    
        <button id="tiny"  ><svg viewBox="-50 -50 100 100"><circle r="7"/></svg></button>
        <button id="small" ><svg viewBox="-50 -50 100 100"><circle r="20"/></svg></button>
        <button id="medium"><svg viewBox="-50 -50 100 100"><circle r="35"/></svg></button>
        <button id="large" ><svg viewBox="-50 -50 100 100"><circle r="50"/></svg></button>
    
        <button id="ocean"    title="Ocean"    ><svg viewBox="-50 -50 100 100"><text y="45">Ocean</text><path d="M -50,-30 q 25,-20 50,0 q 25,20 50,0 l 0,50 l -100,0 z" fill="hsl(240,50%,40%)"/></svg></button>
        <button id="shallow"  title="Water"    ><svg viewBox="-50 -50 100 100"><text y="45">Water</text><path d="M -50,-20 q 15,20 30,0 q 20,20 40,0 q 15,20 30,0 l 0,40 l -100,0 z" fill="hsl(200,50%,70%)"/></svg></button>
        <button id="valley"   title="Valley"   ><svg viewBox="-50 -50 100 100"><text y="45">Valley</text><path d="M -50,-20 c 20,10 80,10 100,0 l 0,40 l -100,0 z" fill="hsl(100,40%,60%)"/></svg></button>
        <button id="mountain" title="Mountain" ><svg viewBox="-50 -50 100 100"><text y="45">Mountains</text><g fill="hsl(60,50%,40%)" stroke="white" stroke-width="2"><path d="M -30,20 l 30,-60 l 30,60 z"/><path d="M -50,20 l 20,-40 l 20,40 z"/><path d="M 10,20 l 15,-30 l 15,30 z"/></g></svg></button>
    
        <div id="sliders">
          <button id="button-reset">Reset Terrain</button>
        </div>
    
        <div id="map"><canvas id="mapgen4" width="2048" height="2048"></canvas></div>
    
      </div>
    
      <div class="toolbar">
        <button id="button-download-config">Export config</button>
        <button id="button-import-config">Import config</button>
        <input  id="input-import-config" type="file" accept="application/json,.json" style="display:none">
    
        <button id="button-download-paint">Export terrain</button>
        <button id="button-import-paint">Import terrain</button>
        <input  id="input-import-paint" type="file" accept="application/json,.json" style="display:none">
    
        <button id="button-download">Save as PNG</button>
        <span class="toolbar-spacer"></span>
        <a id="github-star" href="https://github.com/MichaelCooks/mapgen4" target="_blank" rel="noopener">Star on GitHub</a>
      </div>
    
      <script defer src="build/_bundle.js"></script>
    </div>
